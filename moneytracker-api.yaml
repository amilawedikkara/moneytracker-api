openapi: 3.1.0
info:
  title: MoneyTracker API
  version: 2.0.0
  description: Authentication, dashboard, transactions, categories, and AI scan APIs for MoneyTracker

servers:
  - description: SwaggerHub/API Auto Mocking
    url: https://virtserver.swaggerhub.com/amilawedikkara-87d/moneytracker-auth/1.0.0

paths:
  /auth/register:
    post:
      operationId: userRegister
      summary: User register
      tags:
        - Authentication
      description: Create user account and profile with name, email, password, country, and preferred currency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User successfully registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      operationId: loginToAccount
      summary: Login to account
      tags:
        - Authentication
      description: Login with email and password and return a JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      summary: Get financial dashboard overview
      tags:
        - Dashboard
      description: Returns the user's financial summary including total balance, income, expenses, and monthly budget status. If no budget is set, monthlyBudget.limit defaults to 0 while spending is still calculated from transactions.
      security:
        - BearerJwt: []
      responses:
        "200":
          description: Dashboard data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /transactions:
    post:
      operationId: createTransaction
      summary: Create a new transaction
      tags:
        - Transactions
      description: Creates a new income or expense transaction.
      security:
        - BearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    get:
      operationId: listTransactions
      summary: Get transactions
      tags:
        - Transactions
      description: Returns a list of transactions, optionally filtered by type, category, or period.
      security:
        - BearerJwt: []
      parameters:
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [income, expense]
        - in: query
          name: category
          required: false
          schema:
            type: string
        - in: query
          name: period
          required: false
          description: Reporting period in YYYY-MM format
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
            example: 2026-03
      responses:
        "200":
          description: Transactions retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /transactions/{transactionId}:
    put:
      operationId: updateTransaction
      summary: Update a transaction
      tags:
        - Transactions
      description: Updates an existing income or expense transaction.
      security:
        - BearerJwt: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
          description: Unique transaction identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionRequest"
      responses:
        "200":
          description: Transaction updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      operationId: deleteTransaction
      summary: Delete a transaction
      tags:
        - Transactions
      description: Deletes an existing income or expense transaction.
      security:
        - BearerJwt: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
          description: Unique transaction identifier
      responses:
        "200":
          description: Transaction deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /categories:
    get:
      operationId: getCategories
      summary: Get transaction categories
      tags:
        - Categories
      description: |
        Returns available categories for income and expense transactions.

        Frontend usage:
        - Call /categories?type=income or /categories?type=expense
        - Render each item.name as a selectable option
        - When user selects a category, store item.name
        - When creating/updating a transaction, send the same value as category

        Important:
        - Frontend must NOT hardcode categories
        - Frontend must NOT use index/position as category
      security:
        - BearerJwt: []
      parameters:
        - in: query
          name: type
          required: true
          schema:
            type: string
            enum: [income, expense]
      responses:
        "200":
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /scan/receipt:
    post:
      operationId: scanReceipt
      summary: Scan a receipt or invoice
      tags:
        - AI Scan
      description: Uploads a receipt or invoice image and returns AI-extracted fields for user review. Data must be confirmed or corrected by the user before saving.
      security:
        - BearerJwt: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ReceiptScanRequest"
      responses:
        "200":
          description: Receipt scanned successfully and extracted data returned for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptScanResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /transactions/confirm:
    post:
      operationId: confirmScannedTransaction
      summary: Confirm and save scanned transaction
      tags:
        - AI Scan
      description: Saves a scanned receipt or invoice as a transaction only after the user confirms the reviewed data.
      security:
        - BearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmScannedTransactionRequest"
      responses:
        "201":
          description: Confirmed scanned transaction saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /budgets:
    get:
      operationId: getBudget
      summary: Get monthly budget
      tags:
        - Budget
      description: Returns the user's budget for a given period. If period is not provided, the current month is used by default.
      security:
        - BearerJwt: []
      parameters:
        - in: query
          name: period
          required: false
          description: Defaults to current month if not provided
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
            example: 2026-03
      responses:
        "200":
          description: Budget retrieved successfully. If no budget is set for the period, limit defaults to 0 and spending is still calculated from transactions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetResponse"

    post:
      operationId: setBudget
      summary: Create or update monthly budget
      tags:
        - Budget
      description: Creates or updates a budget for a specific month. The limit must be greater than or equal to current spending calculated from transactions. If violated, the API must return 400 Bad Request.
      security:
        - BearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetBudgetRequest"
      responses:
        "200":
          description: Budget saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetResponse"
  /reports/summary:
    get:
      operationId: getReportSummary
      summary: Get financial summary report
      tags:
        - Reports
      description: Aggregated data derived from transactions for the given period.
      security:
        - BearerJwt: []
      parameters:
        - in: query
          name: period
          required: true
          schema:
            type: string
            example: 2026-03
      responses:
        "200":
          description: Report summary retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportSummaryResponse"

  /reports/trends:
    get:
      operationId: getSpendingTrends
      summary: Get spending trends for charts
      tags:
        - Reports
      description: Returns cumulative daily expense data derived from transactions for the given period. Used to compare spending against budget over time.
      security:
        - BearerJwt: []
      parameters:
        - in: query
          name: period
          required: true
          schema:
            type: string
            example: 2026-03
      responses:
        "200":
          description: Trend data retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingTrendResponse"
components:
  securitySchemes:
    BearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
          example: Pooja
        email:
          type: string
          format: email
          example: pooja@example.com
        password:
          type: string
          format: password
          example: StrongPassword123
        country:
          type: string
          example: Finland
        preferredCurrency:
          type: string
          pattern: "^[A-Z]{3}$"
          example: EUR
      required:
        - name
        - email
        - password
        - country
        - preferredCurrency

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: pooja@example.com
        password:
          type: string
          format: password
          example: StrongPassword123
      required:
        - email
        - password

    AuthSuccessResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expiresIn:
          type: integer
          example: 3600
        message:
          type: string
          example: Authentication successful
      required:
        - token
        - expiresIn
        - message

    DashboardSummaryResponse:
      type: object
      properties:
        userName:
          type: string
          example: Pooja
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          example: EUR
        period:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}$"
          example: 2026-03
          description: Reporting period in YYYY-MM format
        summary:
          type: object
          properties:
            totalBalance:
              type: number
              format: double
              example: 1800
            income:
              type: number
              format: double
              example: 5000
            expenses:
              type: number
              format: double
              example: 3200
          required:
            - totalBalance
            - income
            - expenses
        monthlyBudget:
          $ref: "#/components/schemas/BudgetResponse"

      required:
        - userName
        - currency
        - period
        - summary
        - monthlyBudget

    CreateTransactionRequest:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
          example: income
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 5000
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          example: EUR
        category:
          type: string
          minLength: 2
          maxLength: 50
          example: Salary
        description:
          type: string
          maxLength: 200
          example: Monthly salary
        date:
          type: string
          format: date
          example: 2026-03-10
      required:
        - type
        - amount
        - category
        - date

    UpdateTransactionRequest:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
          example: expense
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 45.5
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          example: EUR
        category:
          type: string
          minLength: 2
          maxLength: 50
          example: Food
        description:
          type: string
          maxLength: 200
          example: Grocery shopping
        date:
          type: string
          format: date
          example: 2026-03-10
      required:
        - type
        - amount
        - category
        - date

    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          example: tx_001
        type:
          type: string
          enum: [income, expense]
          example: income
        amount:
          type: number
          format: double
          example: 5000
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          example: EUR
        category:
          type: string
          example: Salary
        description:
          type: string
          example: Monthly salary
        date:
          type: string
          format: date
          example: 2026-03-10
        createdAt:
          type: string
          format: date-time
          example: 2026-03-10T10:30:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-03-10T12:00:00Z
      required:
        - id
        - type
        - amount
        - currency
        - category
        - date
        - createdAt
        - updatedAt

    TransactionListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TransactionResponse"
        total:
          type: integer
          example: 2
      required:
        - items
        - total

    DeleteSuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: Transaction deleted successfully
      required:
        - message

    CategoryItem:
      type: object
      description: A single selectable category option returned by the API. Frontend must display name and send the same value in transactions.category.
      properties:
        type:
          type: string
          enum: [income, expense]
          example: income
          description: Defines whether the category belongs to income or expense.
        name:
          type: string
          minLength: 2
          maxLength: 50
          example: Salary
          description: Display name shown in UI and must be sent back as category in /transactions.
      required:
        - type
        - name

    CategoryListResponse:
      type: object
      description: List of available categories. Used by frontend to render selectable category options.
      properties:
        items:
          type: array
          description: List of category options.
          items:
            $ref: "#/components/schemas/CategoryItem"
      required:
        - items

    ReceiptScanResponse:
      type: object
      description: |
        AI scan result. Fields may be null or missing depending on extraction success.
        When status = failed, no reliable fields should be used.
      properties:
        scanId:
          type: string
          example: scan_001

        status:
          type: string
          enum: [success, partial, failed]
          description: |
            success = key fields extracted with high confidence
            partial = fields may exist but some have low confidence or may be missing
            failed = no usable data extracted
          example: partial

        detectedFields:
          type: array
          items:
            type: string
            enum: [amount, date, merchant, currency, category]
          example: ["amount", "date", "merchant"]

        suggestedType:
          type: string
          enum: [income, expense]
          example: expense
          description: AI suggestion only. User must confirm or change before saving.

        amount:
          type: number
          format: double
          nullable: true
          example: 23.5

        amountCandidates:
          type: array
          description: Alternative detected amounts including the selected amount. Sorted by confidence (highest first).
          items:
            type: number
          example: [20.0, 3.0, 23.0]

        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          nullable: true
          example: EUR

        merchant:
          type: string
          nullable: true
          example: Lidl

        suggestedCategory:
          type: string
          description: AI-suggested category name. Frontend should validate against /categories API and allow user to correct if no match is found.
          example: Food

        description:
          type: string
          nullable: true
          example: Grocery purchase

        date:
          type: string
          format: date
          nullable: true
          example: 2026-03-10

        confidence:
          type: object
          nullable: true
          description: Confidence scores for extracted fields (0 to 1). Only present for detected fields. May be null if extraction fails.
          properties:
            amount:
              type: number
              minimum: 0
              maximum: 1
              example: 0.95
            date:
              type: number
              minimum: 0
              maximum: 1
              example: 0.8
            merchant:
              type: number
              minimum: 0
              maximum: 1
              example: 0.7

        rawText:
          type: string
          example: "LIDL TOTAL 23.50 EUR 19/03/2026"

      required:
        - scanId
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Invalid request
      required:
        - message

    ReceiptScanRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
        documentType:
          type: string
          description: Helps AI adjust extraction logic (e.g., invoices may contain company names and totals).
          enum: [receipt, invoice]
      required:
        - file

    ConfirmScannedTransactionRequest:
      description: User-confirmed transaction data after reviewing AI-extracted fields.
      type: object
      properties:
        scanId:
          type: string
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
        currency:
          type: string
        category:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
      required:
        - scanId
        - type
        - amount
        - category
        - date
    SetBudgetRequest:
      type: object
      properties:
        period:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}$"
          example: 2026-03
          description: Defaults to current month if not provided
        limit:
          type: number
          format: double
          minimum: 0.01
          example: 5000
      required:
        - limit

    BudgetResponse:
      type: object
      properties:
        period:
          type: string
          example: 2026-03
        limit:
          type: number
          example: 5000
          description: Monthly budget limit. Must be greater than or equal to current spending.
        spent:
          type: number
          example: 3200
          description: Total expenses calculated from transactions for the given period.
        remaining:
          type: number
          example: 1800
          description: limit minus spent. Can be negative if spending exceeds budget or if no budget is set.
        progressPercentage:
          type: integer
          example: 64
          description: Percentage of budget used. Calculated as (spent / limit) * 100. If limit is 0, this value must be 0 to avoid division by zero.
      required:
        - period
        - limit
        - spent
        - remaining
        - progressPercentage
    ReportSummaryResponse:
      type: object
      properties:
        period:
          type: string
          example: 2026-03
        income:
          type: number
          example: 5000
        expenses:
          type: number
          example: 3200
        balance:
          type: number
          example: 1800
      required:
        - period
        - income
        - expenses
        - balance

    SpendingTrendItem:
      type: object
      properties:
        date:
          type: string
          format: date
          example: 2026-03-01
        cumulativeAmount:
          type: number
          example: 200
          description: Cumulative expense amount up to this date within the selected period.
      required:
        - date
        - cumulativeAmount

    SpendingTrendResponse:
      type: object
      properties:
        period:
          type: string
          example: 2026-03
        items:
          type: array
          items:
            $ref: "#/components/schemas/SpendingTrendItem"
      required:
        - period
        - items

  responses:
    BadRequest:
      description: The server could not understand the request due to invalid syntax.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: The server encountered an unexpected condition that prevented it from fulfilling the request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized. Missing or invalid JWT token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

tags:
  - name: Authentication
    description: User registration and login endpoints
  - name: Dashboard
    description: Financial overview endpoints
  - name: Transactions
    description: Create, list, update, and delete income and expense transactions
  - name: Categories
    description: Transaction category endpoints
  - name: AI Scan
    description: AI-assisted receipt and invoice scanning endpoints
  - name: Budget
    description: Monthly budget management endpoints
  - name: Reports
    description: Financial reporting and chart data endpoints
